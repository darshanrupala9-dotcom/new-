<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pocket Money Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .emoji {
            font-size: 50px;
            display: block;
            margin-bottom: 15px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        .input-wrapper {
            position: relative;
        }

        .currency-symbol {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #667eea;
            font-weight: bold;
            font-size: 18px;
        }

        input[type="number"] {
            width: 100%;
            padding: 15px 15px 15px 40px;
            border: 2px solid #e1e1e1;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input[type="number"]:focus {
            outline: none;
            border-color: #667eea;
        }

        .frequency-options {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .freq-btn {
            flex: 1;
            min-width: 80px;
            padding: 12px;
            border: 2px solid #e1e1e1;
            border-radius: 10px;
            background: white;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .freq-btn:hover {
            border-color: #667eea;
        }

        .freq-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: transparent;
        }

        .calculate-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .calculate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .results {
            margin-top: 30px;
            display: none;
        }

        .results.show {
            display: block;
        }

        .results-title {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
            font-size: 18px;
        }

        .result-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 15px;
        }

        .result-card h3 {
            color: #555;
            font-size: 14px;
            margin-bottom: 5px;
        }

        .result-card .amount {
            color: #667eea;
            font-size: 24px;
            font-weight: bold;
        }

        .total-result {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .total-result h3 {
            color: white;
        }

        .total-result .amount {
            color: white;
            font-size: 32px;
        }

        .pie-chart-container {
            margin-top: 20px;
            text-align: center;
        }

        .chart-info {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .chart-legend {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        @media (max-width: 480px) {
            .container {
                padding: 25px;
            }

            .header h1 {
                font-size: 22px;
            }

            .result-card .amount {
                font-size: 20px;
            }

            .total-result .amount {
                font-size: 26px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <span class="emoji">💰</span>
            <h1>Pocket Money Calculator</h1>
            <p>Calculate your allowance over time!</p>
        </div>

        <div class="form-group">
            <label>Amount Given by Parents</label>
            <div class="input-wrapper">
                <span class="currency-symbol">$</span>
                <input type="number" id="amount" placeholder="Enter amount" min="0" step="0.01">
            </div>
        </div>

        <div class="form-group">
            <label>How often?</label>
            <div class="frequency-options">
                <button class="freq-btn active" data-freq="daily">Daily</button>
                <button class="freq-btn" data-freq="weekly">Weekly</button>
                <button class="freq-btn" data-freq="monthly">Monthly</button>
            </div>
        </div>

        <button class="calculate-btn" onclick="calculate()">Calculate 💎</button>

        <div class="results" id="results">
            <h3 class="results-title">📊 Your Pocket Money Summary</h3>
            
            <div class="result-card">
                <h3>Per Week</h3>
                <div class="amount" id="weeklyAmount">$0.00</div>
            </div>

            <div class="result-card">
                <h3>Per Month (30 days)</h3>
                <div class="amount" id="monthlyAmount">$0.00</div>
            </div>

            <div class="result-card">
                <h3>Per Year (365 days)</h3>
                <div class="amount" id="yearlyAmount">$0.00</div>
            </div>

            <div class="result-card total-result">
                <h3>TOTAL (1 Year)</h3>
                <div class="amount" id="totalAmount">$0.00</div>
            </div>

            <div class="pie-chart-container">
                <canvas id="pieChart" width="200" height="200"></canvas>
                <div class="chart-info">
                    <div class="chart-legend">
                        <div class="legend-dot" style="background: #667eea;"></div>
                        <span>Weekly</span>
                    </div>
                    <div class="chart-legend">
                        <div class="legend-dot" style="background: #764ba2;"></div>
                        <span>Monthly</span>
                    </div>
                    <div class="chart-legend">
                        <div class="legend-dot" style="background: #f093fb;"></div>
                        <span>Yearly</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let selectedFrequency = 'daily';

        // Frequency button click handlers
        document.querySelectorAll('.freq-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.freq-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                selectedFrequency = this.dataset.freq;
            });
        });

        function calculate() {
            const amount = parseFloat(document.getElementById('amount').value);

            if (isNaN(amount) || amount <= 0) {
                alert('Please enter a valid amount!');
                return;
            }

            let weekly, monthly, yearly;

            switch(selectedFrequency) {
                case 'daily':
                    weekly = amount * 7;
                    monthly = amount * 30;
                    yearly = amount * 365;
                    break;
                case 'weekly':
                    weekly = amount;
                    monthly = amount * 4.33;
                    yearly = amount * 52;
                    break;
                case 'monthly':
                    weekly = amount / 4.33;
                    monthly = amount;
                    yearly = amount * 12;
                    break;
            }

            document.getElementById('weeklyAmount').textContent = '$' + weekly.toFixed(2);
            document.getElementById('monthlyAmount').textContent = '$' + monthly.toFixed(2);
            document.getElementById('yearlyAmount').textContent = '$' + yearly.toFixed(2);
            document.getElementById('totalAmount').textContent = '$' + yearly.toFixed(2);

            document.getElementById('results').classList.add('show');

            // Draw simple pie chart
            drawPieChart(weekly, monthly, yearly);
        }

        function drawPieChart(weekly, monthly, yearly) {
            const canvas = document.getElementById('pieChart');
            const ctx = canvas.getContext('2d');
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radius = 70;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const total = weekly + monthly + yearly;
            const segments = [
                { value: weekly / total, color: '#667eea' },
                { value: monthly / total, color: '#764ba2' },
                { value: yearly / total, color: '#f093fb' }
            ];

            let startAngle = -Math.PI / 2;

            segments.forEach(segment => {
                const sliceAngle = segment.value * 2 * Math.PI;
                
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, startAngle, startAngle + sliceAngle);
                ctx.closePath();
                ctx.fillStyle = segment.color;
                ctx.fill();

                startAngle += sliceAngle;
            });

            // Draw center circle for donut effect
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius * 0.5, 0, 2 * Math.PI);
            ctx.fillStyle = 'white';
            ctx.fill();
        }
    </script>
</body>
</html>
